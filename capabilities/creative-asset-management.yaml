naftiko: "1.0.0-alpha1"

info:
  label: "Adobe Premiere Creative Asset Management"
  description: "Workflow capability for managing shared Creative Cloud Libraries and design assets for use in Adobe Premiere Pro video editing projects. Designed for video production teams and media asset managers."
  tags:
    - Adobe Premiere
    - Creative Cloud
    - Asset Management
    - Video Production
    - Media
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      ADOBE_CC_ACCESS_TOKEN: ADOBE_CC_ACCESS_TOKEN

capability:
  consumes:
    - import: cc-libraries
      location: ./shared/creative-cloud-libraries-api.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: creative-asset-management-api
      description: "Unified REST API for Creative Cloud Libraries asset management in Adobe Premiere Pro workflows."
      resources:
        - path: /v1/libraries
          name: libraries
          description: "Creative Cloud Libraries for shared production assets."
          operations:
            - method: GET
              name: list-libraries
              description: "List all Creative Cloud Libraries."
              call: "cc-libraries.list-libraries"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-library
              description: "Create a new Creative Cloud Library."
              call: "cc-libraries.create-library"
              with:
                name: "rest.name"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/libraries/{libraryId}/elements
          name: library-elements
          description: "Elements within a Creative Cloud Library."
          operations:
            - method: GET
              name: list-elements
              description: "List elements in a library."
              call: "cc-libraries.list-elements"
              with:
                libraryId: "rest.libraryId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: add-element
              description: "Add an element to a library."
              call: "cc-libraries.create-element"
              with:
                libraryId: "rest.libraryId"
                elementName: "rest.elementName"
                elementType: "rest.elementType"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9090
      namespace: creative-asset-management-mcp
      transport: http
      description: "MCP server for AI-assisted creative asset management in Adobe Premiere Pro — discover, organize, and manage brand assets in Creative Cloud Libraries."
      tools:
        - name: list-libraries
          description: "List all Creative Cloud Libraries available for use in Adobe Premiere Pro projects."
          hints:
            readOnly: true
            openWorld: true
          call: "cc-libraries.list-libraries"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-library
          description: "Create a new Creative Cloud Library for organizing video production brand assets."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "cc-libraries.create-library"
          with:
            name: "tools.name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-library-elements
          description: "List design elements (colors, graphics, fonts, patterns, videos) within a Creative Cloud Library."
          hints:
            readOnly: true
            openWorld: true
          call: "cc-libraries.list-elements"
          with:
            libraryId: "tools.libraryId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: add-library-element
          description: "Add a new design element to a Creative Cloud Library for sharing with the Premiere Pro team."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "cc-libraries.create-element"
          with:
            libraryId: "tools.libraryId"
            elementName: "tools.elementName"
            elementType: "tools.elementType"
          outputParameters:
            - type: object
              mapping: "$."
